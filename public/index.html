<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Downturn</title>
<style>
/* GitHub dark theme tokens */
:root {
  --color-bg: #0d1117;
  --color-bg-secondary: #161b22;
  --color-bg-tertiary: #21262d;
  --color-border: #30363d;
  --color-border-hover: #8b949e;
  --color-text: #e6edf3;
  --color-text-secondary: #e6edf3;
  --color-text-muted: #8b949e;
  --color-text-placeholder: #6e7681;
  --color-link: #58a6ff;
  --color-accent: #1f6feb;
  --color-danger: #f85149;
  --color-code-bg: #161b22;
  --radius: 6px;
  --font-sm: .75rem;
  --font-base: .875rem;
  --font-lg: 1.25rem;
  --control-h: 32px;
  --control-px: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.5;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
a { color: var(--color-link); text-decoration: none; }
a:hover { text-decoration: underline; }
/* Tab bar */
.tabbar {
  display: flex;
  align-items: flex-end;
  background: var(--color-bg);
  padding: 6px 8px 0;
  flex-shrink: 0;
  gap: 2px;
}
.tabs {
  display: flex;
  overflow-x: auto;
  gap: 2px;
  min-width: 0;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  height: 32px;
  padding: 0 10px;
  width: 180px;
  background: var(--color-bg-tertiary);
  border: 1px solid var(--color-border);
  border-bottom: none;
  border-radius: var(--radius) var(--radius) 0 0;
  color: var(--color-text-muted);
  font-size: var(--font-sm);
  cursor: pointer;
  flex-shrink: 0;
}
.tab:hover { color: var(--color-text); }
.tab.active {
  background: var(--color-bg-secondary);
  color: var(--color-text);
  border-color: var(--color-border);
}
.tab-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}
.tab-close {
  display: none;
  width: 16px;
  height: 16px;
  line-height: 16px;
  text-align: center;
  border-radius: 3px;
  font-size: 14px;
  flex-shrink: 0;
}
.tab-close:hover { background: var(--color-border); }
.tab:hover .tab-close, .tab.active .tab-close { display: block; }
.tab-new {
  width: 28px;
  height: 28px;
  background: none;
  border: 1px solid transparent;
  border-radius: var(--radius);
  color: var(--color-text-muted);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-bottom: 2px;
}
.tab-new:hover { background: var(--color-bg-tertiary); color: var(--color-text); }
/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--color-bg-secondary);
  border-top: 1px solid var(--color-border);
  border-bottom: 1px solid var(--color-border);
  flex-shrink: 0;
}
.nav-btn {
  height: var(--control-h);
  width: var(--control-h);
  padding: 0;
  background: var(--color-bg-tertiary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  color: var(--color-text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn svg { width: 14px; height: 14px; fill: currentColor; }
.nav-btn:hover { background: var(--color-border); border-color: var(--color-border-hover); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn:disabled:hover { background: var(--color-bg-tertiary); border-color: var(--color-border); }
.topbar-sep { width: 1px; height: 20px; background: var(--color-border); flex-shrink: 0; }
#urlInput {
  flex: 1;
  height: var(--control-h);
  padding: 0 var(--control-px);
  font-size: var(--font-base);
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  color: var(--color-text);
  line-height: var(--control-h);
  outline: none;
}
#urlInput:focus { border-color: var(--color-link); box-shadow: 0 0 0 3px rgba(31,111,235,.3); }
#urlInput::placeholder { color: var(--color-text-placeholder); }
.topbar-right { display: flex; gap: 8px; align-items: center; }
/* Loading */
#loading {
  display: none;
  width: 16px; height: 16px;
  border: 2px solid var(--color-border);
  border-top-color: var(--color-link);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* Settings popover */
.settings-wrap { position: relative; }
#settingsPopover {
  display: none;
  position: absolute;
  top: 40px;
  right: 0;
  background: var(--color-bg-secondary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: 12px 16px;
  z-index: 10;
  min-width: 200px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
#settingsPopover.open { display: block; }
#settingsPopover label {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  font-size: var(--font-base);
  color: var(--color-text);
  cursor: pointer;
}
/* Main layout */
.main-area {
  flex: 1;
  display: flex;
  overflow: hidden;
}
/* Split pane */
.panes {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-width: 0;
}
.pane {
  flex: 1;
  overflow: auto;
  padding: 24px 32px;
}
.pane::-webkit-scrollbar { width: 8px; }
.pane::-webkit-scrollbar-track { background: transparent; }
.pane::-webkit-scrollbar-thumb { background: var(--color-bg-tertiary); border-radius: 4px; }
.pane::-webkit-scrollbar-thumb:hover { background: var(--color-border-hover); }
#rawPane {
  font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  font-size: var(--font-base);
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  border-right: 1px solid var(--color-border);
  user-select: text;
  color: var(--color-text);
}
.panes.single .pane {
  border-right: none;
  max-width: none;
  padding-left: max(32px, calc((100% - 700px) / 2));
  padding-right: max(32px, calc((100% - 700px) / 2));
}
.panes.single .divider { display: none; }
.divider {
  width: 4px;
  cursor: col-resize;
  background: var(--color-border);
  flex-shrink: 0;
}
.divider:hover { background: var(--color-link); }
/* Preview pane — GitHub markdown-body styling */
#previewPane {
  font-size: 16px;
  line-height: 1.5;
  word-wrap: break-word;
  color: var(--color-text);
}
#previewPane h1 { font-size: 2em; font-weight: 600; margin: 0 0 16px; padding-bottom: 0.3em; border-bottom: 1px solid var(--color-border); }
#previewPane h2 { font-size: 1.5em; font-weight: 600; margin: 24px 0 16px; padding-bottom: 0.3em; border-bottom: 1px solid var(--color-border); }
#previewPane h3 { font-size: 1.25em; font-weight: 600; margin: 24px 0 16px; }
#previewPane h4 { font-size: 1em; font-weight: 600; margin: 24px 0 16px; }
#previewPane h5 { font-size: .875em; font-weight: 600; margin: 24px 0 16px; }
#previewPane h6 { font-size: .85em; font-weight: 600; margin: 24px 0 16px; color: var(--color-text-muted); }
#previewPane p { margin: 0 0 16px; }
#previewPane a { color: var(--color-link); text-decoration: none; cursor: pointer; }
#previewPane a:hover { text-decoration: underline; }
#previewPane img { max-width: 100%; border-radius: var(--radius); margin: 8px 0; }
#previewPane pre {
  background: var(--color-code-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: 16px;
  overflow-x: auto;
  margin: 0 0 16px;
  line-height: 1.45;
}
#previewPane code {
  font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  font-size: 85%;
}
#previewPane :not(pre) > code {
  background: var(--color-bg-tertiary);
  padding: 0.2em 0.4em;
  border-radius: var(--radius);
  font-size: 85%;
}
#previewPane blockquote {
  border-left: 0.25em solid var(--color-border);
  padding: 0 1em;
  margin: 0 0 16px;
  color: var(--color-text-muted);
}
#previewPane ul, #previewPane ol { padding-left: 2em; margin: 0 0 16px; }
#previewPane li { margin: 0.25em 0; }
#previewPane li + li { margin-top: 0.25em; }
#previewPane hr { border: none; border-top: 1px solid var(--color-border); margin: 24px 0; height: 0.25em; background: var(--color-border); border-radius: 2px; }
#previewPane table { border-collapse: collapse; margin: 0 0 16px; width: auto; display: block; overflow-x: auto; }
#previewPane th, #previewPane td { border: 1px solid var(--color-border); padding: 6px 13px; }
#previewPane th { font-weight: 600; background: var(--color-bg-secondary); }
#previewPane tr:nth-child(2n) { background: var(--color-bg-secondary); }
#previewPane strong { font-weight: 600; }
/* Nav sidebar */
.nav-sidebar {
  width: 220px;
  flex-shrink: 0;
  overflow-y: auto;
  border-right: 1px solid var(--color-border);
  background: var(--color-bg-secondary);
  display: none;
  font-size: var(--font-sm);
}
.nav-sidebar.open { display: block; }
.nav-sidebar ul { list-style: none; padding: 8px 0; }
.nav-sidebar li a {
  display: block;
  padding: 4px 16px;
  color: var(--color-text-muted);
  text-decoration: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.nav-sidebar li a:hover { color: var(--color-link); background: var(--color-bg-tertiary); }
.nav-sidebar li a.active { color: var(--color-text); background: var(--color-bg-tertiary); font-weight: 600; }
.nav-sidebar .nav-empty { padding: 16px; color: var(--color-text-placeholder); text-align: center; font-style: italic; }
.nav-sidebar::-webkit-scrollbar { width: 8px; }
.nav-sidebar::-webkit-scrollbar-track { background: transparent; }
.nav-sidebar::-webkit-scrollbar-thumb { background: var(--color-bg-tertiary); border-radius: 4px; }
/* Bottom bar */
.bottombar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  background: var(--color-bg-secondary);
  border-top: 1px solid var(--color-border);
  flex-shrink: 0;
  font-size: var(--font-sm);
  color: var(--color-text-muted);
}
.bottombar button {
  height: 28px;
  padding: 0 var(--control-px);
  font-size: var(--font-sm);
  font-weight: 500;
  background: var(--color-bg-tertiary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  color: var(--color-text-muted);
  cursor: pointer;
}
#copyBtn { width: 60px; text-align: center; }
.bottombar button:hover:not(:disabled) { background: var(--color-border); border-color: var(--color-border-hover); color: var(--color-text); }
.bottombar button:disabled { color: var(--color-text-placeholder); cursor: default; }
.view-toggle { display: inline-flex; }
.view-toggle .vt-btn { border-radius: 0; border-right: none; }
.view-toggle .vt-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.view-toggle .vt-btn:last-child { border-right: 1px solid var(--color-border); border-radius: 0 var(--radius) var(--radius) 0; }
.vt-btn.active { background: var(--color-accent); border-color: var(--color-accent); color: #fff; }
#status { flex: 1; }
/* Empty state */
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--color-text-placeholder);
  font-size: var(--font-base);
}
</style>
</head>
<body>

<div class="tabbar">
  <div class="tabs" id="tabContainer"></div>
  <button class="tab-new" id="newTabBtn" title="New tab (Ctrl+T)">+</button>
</div>
<div class="topbar">
  <button class="nav-btn" id="navToggle" title="Toggle site navigation"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M0 96C0 78.3 14.3 64 32 64l384 0c17.7 0 32 14.3 32 32s-14.3 32-32 32L32 128C14.3 128 0 113.7 0 96zM0 256c0-17.7 14.3-32 32-32l384 0c17.7 0 32 14.3 32 32s-14.3 32-32 32L32 288c-17.7 0-32-14.3-32-32zM448 416c0 17.7-14.3 32-32 32L32 448c-17.7 0-32-14.3-32-32s14.3-32 32-32l384 0c17.7 0 32 14.3 32 32z"/></svg></button>
  <div class="topbar-sep"></div>
  <button class="nav-btn" id="backBtn" title="Back"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.2 288 416 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-306.7 0L214.6 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"/></svg></button>
  <button class="nav-btn" id="fwdBtn" title="Forward"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M438.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L338.8 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l306.7 0L233.4 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"/></svg></button>
  <button class="nav-btn" id="refreshBtn" title="Refresh"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M386.3 160L336 160c-17.7 0-32 14.3-32 32s14.3 32 32 32l128 0c17.7 0 32-14.3 32-32l0-128c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 51.2L414.4 97.6c-87.5-87.5-229.3-87.5-316.8 0s-87.5 229.3 0 316.8s229.3 87.5 316.8 0c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0c-62.5 62.5-163.8 62.5-226.3 0s-62.5-163.8 0-226.3s163.8-62.5 226.3 0L386.3 160z"/></svg></button>
  <button class="nav-btn" id="homeBtn" title="Home"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M575.8 255.5c0 18-15 32.1-32 32.1l-32 0 0 160c0 35.3-28.7 64-64 64l-320 0c-35.3 0-64-28.7-64-64l0-160-32 0c-18 0-32-14-32-32.1c0-9 3-17 10-24L266.4 8c7-7 15-8 22-8s15 2 21 7L564.8 231.5c8 7 12 15 11 24z"/></svg></button>
  <input type="text" id="urlInput" placeholder="Enter a URL and press Enter" autofocus>
  <div id="loading"></div>
  <div class="topbar-right">
    <div class="settings-wrap">
      <button class="nav-btn" id="settingsBtn" title="Options"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M495.9 166.6c3.2 8.7 .5 18.4-6.4 24.6l-43.3 39.4c1.1 8.3 1.7 16.8 1.7 25.4s-.6 17.1-1.7 25.4l43.3 39.4c6.9 6.2 9.6 15.9 6.4 24.6c-4.4 11.9-9.7 23.3-15.8 34.3l-4.7 8.1c-6.6 11-14 21.4-22.1 31.2c-5.9 7.2-15.7 9.6-24.5 6.8l-55.7-17.7c-13.4 10.3-28.2 18.9-44 25.4l-12.5 57.1c-2 9.1-9 16.3-18.2 17.8c-13.8 2.3-28 3.5-42.5 3.5s-28.7-1.2-42.5-3.5c-9.2-1.5-16.2-8.7-18.2-17.8l-12.5-57.1c-15.8-6.5-30.6-15.1-44-25.4L83.1 425.9c-8.8 2.8-18.6 .3-24.5-6.8c-8.1-9.8-15.5-20.2-22.1-31.2l-4.7-8.1c-6.1-11-11.4-22.4-15.8-34.3c-3.2-8.7-.5-18.4 6.4-24.6l43.3-39.4C64.6 273.1 64 264.6 64 256s.6-17.1 1.7-25.4L22.4 191.2c-6.9-6.2-9.6-15.9-6.4-24.6c4.4-11.9 9.7-23.3 15.8-34.3l4.7-8.1c6.6-11 14-21.4 22.1-31.2c5.9-7.2 15.7-9.6 24.5-6.8l55.7 17.7c13.4-10.3 28.2-18.9 44-25.4l12.5-57.1c2-9.1 9-16.3 18.2-17.8C227.3 1.2 241.5 0 256 0s28.7 1.2 42.5 3.5c9.2 1.5 16.2 8.7 18.2 17.8l12.5 57.1c15.8 6.5 30.6 15.1 44 25.4l55.7-17.7c8.8-2.8 18.6-.3 24.5 6.8c8.1 9.8 15.5 20.2 22.1 31.2l4.7 8.1c6.1 11 11.4 22.4 15.8 34.3zM256 336a80 80 0 1 0 0-160 80 80 0 1 0 0 160z"/></svg></button>
      <div id="settingsPopover">
        <label><input type="checkbox" id="optTitle" checked> Include title</label>
        <label><input type="checkbox" id="optLinks" checked> Include links</label>
        <label><input type="checkbox" id="optImages" checked> Include images</label>
        <label><input type="checkbox" id="optClean" checked> Use Readability</label>
        <label><input type="checkbox" id="optAbsolute" checked> Absolute URLs</label>
      </div>
    </div>
  </div>
</div>

<div class="main-area">
  <div class="nav-sidebar open" id="navSidebar"><ul></ul></div>
  <div class="panes">
    <div class="pane" id="rawPane"><div class="empty-state">Markdown will appear here</div></div>
    <div class="divider" id="divider"></div>
    <div class="pane" id="previewPane"><div class="empty-state">Rendered preview will appear here</div></div>
  </div>
</div>

<div class="bottombar">
  <button id="copyBtn" disabled>Copy</button>
  <button id="downloadBtn" disabled>Download .md</button>
  <div class="view-toggle">
    <button class="vt-btn" data-view="both">Both</button>
    <button class="vt-btn" data-view="raw">Markdown</button>
    <button class="vt-btn active" data-view="preview">Preview</button>
  </div>
  <button id="openBtn" disabled>Open in browser</button>
  <span id="status"></span>
  <span id="stats"></span>
</div>

<script type="module">
import { markdownToHtml, inline, esc, normalizeUrl, formatStats } from './ui.mjs';
const API_BASE = '';

// Settings persistence
const SETTINGS_KEY = 'downturn-settings';
function saveSettings() {
  const settings = {
    optTitle: document.getElementById('optTitle').checked,
    optLinks: document.getElementById('optLinks').checked,
    optImages: document.getElementById('optImages').checked,
    optClean: document.getElementById('optClean').checked,
    optAbsolute: document.getElementById('optAbsolute').checked,
    view: document.querySelector('.vt-btn.active')?.dataset.view || 'both',
    navOpen: document.getElementById('navSidebar').classList.contains('open'),
  };
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}
function applyView(view) {
  document.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.vt-btn[data-view="${view}"]`);
  if (btn) btn.classList.add('active');
  const panes = document.querySelector('.panes');
  document.getElementById('rawPane').style.display = (view === 'preview') ? 'none' : '';
  document.getElementById('previewPane').style.display = (view === 'raw') ? 'none' : '';
  panes.classList.toggle('single', view !== 'both');
}
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if (!s) return false;
    if (s.optTitle !== undefined) document.getElementById('optTitle').checked = s.optTitle;
    if (s.optLinks !== undefined) document.getElementById('optLinks').checked = s.optLinks;
    if (s.optImages !== undefined) document.getElementById('optImages').checked = s.optImages;
    if (s.optClean !== undefined) document.getElementById('optClean').checked = s.optClean;
    if (s.optAbsolute !== undefined) document.getElementById('optAbsolute').checked = s.optAbsolute;
    if (s.view) applyView(s.view);
    const sidebar = document.getElementById('navSidebar');
    if (s.navOpen) sidebar.classList.add('open');
    else sidebar.classList.remove('open');
    return true;
  } catch { return false; }
}

// Elements
const urlInput = document.getElementById('urlInput');
const rawPane = document.getElementById('rawPane');
const previewPane = document.getElementById('previewPane');
const navSidebar = document.getElementById('navSidebar');
const loading = document.getElementById('loading');
const statusEl = document.getElementById('status');
const stats = document.getElementById('stats');
const divider = document.getElementById('divider');
const settingsBtn = document.getElementById('settingsBtn');
const settingsPopover = document.getElementById('settingsPopover');
const tabContainer = document.getElementById('tabContainer');

// Tab state
let tabs = [];
let activeTabId = 0;
let nextTabId = 1;
const pageCache = {};
const TABS_KEY = 'downturn-tabs-v2';

function saveTabs() {
  const data = {
    tabs: tabs.map(t => ({ id: t.id, url: t.url, markdown: t.markdown, nav: t.nav, stats: t.stats })),
    activeTabId,
    nextTabId,
  };
  sessionStorage.setItem(TABS_KEY, JSON.stringify(data));
}

function loadTabs() {
  try {
    const data = JSON.parse(sessionStorage.getItem(TABS_KEY));
    if (!data || !data.tabs?.length) return false;
    tabs = data.tabs.map(t => ({ ...t, rawScroll: 0, previewScroll: 0 }));
    activeTabId = data.activeTabId;
    nextTabId = data.nextTabId;
    // Repopulate pageCache from tab data
    for (const t of tabs) {
      if (t.url && t.markdown) pageCache[t.url] = { markdown: t.markdown, nav: t.nav };
    }
    return true;
  } catch { return false; }
}

function getTab(id) { return tabs.find(t => t.id === id); }
function getActiveTab() { return getTab(activeTabId); }

function tabTitle(tab) {
  if (tab.markdown) {
    const m = tab.markdown.match(/^#\s+(.+)/m);
    if (m) return m[1].slice(0, 40);
  }
  if (tab.url) {
    try { return new URL(tab.url).hostname; } catch {}
  }
  return 'New Tab';
}

function renderTabs() {
  tabContainer.innerHTML = tabs.map(t =>
    `<div class="tab${t.id === activeTabId ? ' active' : ''}" data-tab-id="${t.id}">` +
    `<span class="tab-title">${tabTitle(t)}</span>` +
    `<span class="tab-close">&times;</span></div>`
  ).join('');
  saveTabs();
}

function saveTabScroll() {
  const tab = getActiveTab();
  if (tab) {
    tab.rawScroll = rawPane.scrollTop;
    tab.previewScroll = previewPane.scrollTop;
  }
}

function displayTab(tab) {
  urlInput.value = tab.url || '';
  if (tab.markdown) {
    rawPane.textContent = tab.markdown;
    previewPane.innerHTML = markdownToHtml(tab.markdown);
    document.getElementById('copyBtn').disabled = false;
    document.getElementById('downloadBtn').disabled = false;
    document.getElementById('openBtn').disabled = false;
  } else {
    rawPane.innerHTML = '<div class="empty-state">Markdown will appear here</div>';
    previewPane.innerHTML = '<div class="empty-state">Rendered preview will appear here</div>';
    document.getElementById('copyBtn').disabled = true;
    document.getElementById('downloadBtn').disabled = true;
    document.getElementById('openBtn').disabled = true;
  }
  renderNav(tab.nav || null);
  stats.textContent = tab.stats || '';
  statusEl.textContent = '';
  requestAnimationFrame(() => {
    rawPane.scrollTop = tab.rawScroll || 0;
    previewPane.scrollTop = tab.previewScroll || 0;
  });
  window.history.replaceState({ url: tab.url }, '', tab.url ? '#' + tab.url : window.location.pathname);
}

function switchTab(id) {
  if (id === activeTabId) return;
  saveTabScroll();
  activeTabId = id;
  renderTabs();
  displayTab(getActiveTab());
}

function createTab(url) {
  const tab = { id: nextTabId++, url: '', markdown: '', nav: [], stats: '', rawScroll: 0, previewScroll: 0 };
  tabs.push(tab);
  saveTabScroll();
  activeTabId = tab.id;
  renderTabs();
  displayTab(tab);
  if (url) navigate(url);
  else urlInput.focus();
  return tab;
}

function closeTab(id) {
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  tabs.splice(idx, 1);
  if (tabs.length === 0) {
    createTab();
    return;
  }
  if (activeTabId === id) {
    activeTabId = tabs[Math.min(idx, tabs.length - 1)].id;
    displayTab(getActiveTab());
  }
  renderTabs();
}

// Tab bar events
tabContainer.addEventListener('click', (e) => {
  const close = e.target.closest('.tab-close');
  if (close) {
    const tabEl = close.closest('.tab');
    closeTab(Number(tabEl.dataset.tabId));
    return;
  }
  const tabEl = e.target.closest('.tab');
  if (tabEl) switchTab(Number(tabEl.dataset.tabId));
});
document.getElementById('newTabBtn').addEventListener('click', () => createTab());

// Navigate in current tab
async function navigate(targetUrl, { pushState = true } = {}) {
  if (!targetUrl) return;
  targetUrl = normalizeUrl(targetUrl);

  const tab = getActiveTab();
  tab.url = targetUrl;
  urlInput.value = targetUrl;

  if (pageCache[targetUrl]) {
    const cached = pageCache[targetUrl];
    tab.markdown = cached.markdown;
    tab.nav = cached.nav;
    const t0 = performance.now();
    rawPane.textContent = tab.markdown;
    previewPane.innerHTML = markdownToHtml(tab.markdown);
    renderNav(tab.nav);
    tab.stats = formatStats(tab.markdown, performance.now() - t0, '(cached)');
    stats.textContent = tab.stats;
    document.getElementById('copyBtn').disabled = false;
    document.getElementById('downloadBtn').disabled = false;
    document.getElementById('openBtn').disabled = false;
    requestAnimationFrame(() => { rawPane.scrollTop = 0; previewPane.scrollTop = 0; });
    if (pushState) window.history.pushState({ url: targetUrl }, '', '#' + targetUrl);
    statusEl.textContent = '';
    renderTabs();
    return;
  }

  loading.style.display = 'block';
  statusEl.textContent = 'Fetching...';
  stats.textContent = '';
  const t0 = performance.now();

  const params = new URLSearchParams({
    url: targetUrl, nav: 'true',
    title: document.getElementById('optTitle').checked,
    links: document.getElementById('optLinks').checked,
    images: document.getElementById('optImages').checked,
    clean: document.getElementById('optClean').checked,
    absoluteUrls: document.getElementById('optAbsolute').checked,
  });

  try {
    const resp = await fetch(`${API_BASE}/api?${params}`);
    if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
    const data = await resp.json();
    const elapsed = performance.now() - t0;

    tab.markdown = data.markdown;
    tab.nav = data.nav;
    pageCache[targetUrl] = data;

    rawPane.textContent = tab.markdown;
    previewPane.innerHTML = markdownToHtml(tab.markdown);
    renderNav(tab.nav);
    tab.stats = formatStats(tab.markdown, elapsed);
    stats.textContent = tab.stats;
    document.getElementById('copyBtn').disabled = false;
    document.getElementById('downloadBtn').disabled = false;
    document.getElementById('openBtn').disabled = false;
    requestAnimationFrame(() => { rawPane.scrollTop = 0; previewPane.scrollTop = 0; });
    if (pushState) window.history.pushState({ url: targetUrl }, '', '#' + targetUrl);
    statusEl.textContent = '';
    renderTabs();
  } catch (e) {
    statusEl.textContent = `Error: ${e.message}`;
    rawPane.textContent = `Error: ${e.message}`;
    previewPane.innerHTML = `<div class="empty-state">Error: ${e.message}</div>`;
  } finally {
    loading.style.display = 'none';
  }
}

function renderNav(nav) {
  const ul = navSidebar.querySelector('ul');
  const currentUrl = urlInput.value;
  const navArr = nav || [];
  if (navArr.length === 0) {
    ul.innerHTML = '<li class="nav-empty">No navigation found</li>';
    return;
  }
  ul.innerHTML = navArr.map(n =>
    `<li><a href="${n.href}" title="${n.text}"${n.href === currentUrl ? ' class="active"' : ''}>${n.text}</a></li>`
  ).join('');
}

const navToggle = document.getElementById('navToggle');
navToggle.addEventListener('click', () => {
  navSidebar.classList.toggle('open');
  saveSettings();
});

function showStats(markdown, ms, suffix) {
  stats.textContent = formatStats(markdown, ms, suffix);
}

// Browser back/forward
window.addEventListener('popstate', (e) => {
  const targetUrl = e.state?.url;
  if (targetUrl) navigate(targetUrl, { pushState: false });
});

// Init
if (!loadSettings()) applyView('preview');
if (loadTabs()) {
  // Restore saved tabs
  renderTabs();
  displayTab(getActiveTab());
} else {
  createTab(); // first empty tab
  const hash = window.location.hash.slice(1);
  const targetUrl = hash || new URLSearchParams(window.location.search).get('url');
  if (targetUrl) {
    window.history.replaceState({ url: targetUrl }, '', '#' + targetUrl);
    navigate(targetUrl, { pushState: false });
  }
}

// Link interception — Ctrl/middle-click opens new tab
for (const el of [previewPane, navSidebar]) {
  el.addEventListener('click', (e) => {
    const link = e.target.closest('a');
    if (!link) return;
    e.preventDefault();
    const href = link.getAttribute('href');
    if (!href || href.startsWith('#')) return;
    if (e.ctrlKey || e.metaKey || e.button === 1) {
      createTab(href);
    } else {
      navigate(href);
    }
  });
  el.addEventListener('auxclick', (e) => {
    const link = e.target.closest('a');
    if (!link || e.button !== 1) return;
    e.preventDefault();
    const href = link.getAttribute('href');
    if (!href || href.startsWith('#')) return;
    createTab(href);
  });
}

// URL input
urlInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') navigate(urlInput.value.trim());
});

// Refresh
document.getElementById('refreshBtn').addEventListener('click', () => {
  for (const key in pageCache) delete pageCache[key];
  const targetUrl = urlInput.value.trim();
  if (targetUrl) navigate(targetUrl, { pushState: false });
});

// Back/Forward
document.getElementById('backBtn').addEventListener('click', () => history.back());
document.getElementById('fwdBtn').addEventListener('click', () => history.forward());

// Home button — clears active tab
document.getElementById('homeBtn').addEventListener('click', () => {
  const tab = getActiveTab();
  tab.url = '';
  tab.markdown = '';
  tab.nav = [];
  tab.stats = '';
  displayTab(tab);
  renderTabs();
  urlInput.focus();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') { e.preventDefault(); urlInput.focus(); urlInput.select(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 't') { e.preventDefault(); createTab(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'w') { e.preventDefault(); closeTab(activeTabId); }
  if (e.ctrlKey && e.key === 'Tab') {
    e.preventDefault();
    const idx = tabs.findIndex(t => t.id === activeTabId);
    const next = e.shiftKey ? (idx - 1 + tabs.length) % tabs.length : (idx + 1) % tabs.length;
    switchTab(tabs[next].id);
  }
});

// Copy
const copyBtn = document.getElementById('copyBtn');
copyBtn.addEventListener('click', async () => {
  const md = getActiveTab()?.markdown;
  if (!md) return;
  try {
    await navigator.clipboard.writeText(md);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = md;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  copyBtn.textContent = 'Copied!';
  setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
});

// Download
document.getElementById('downloadBtn').addEventListener('click', () => {
  const tab = getActiveTab();
  if (!tab?.markdown) return;
  const h1Match = tab.markdown.match(/^#\s+(.+)/m);
  let slug;
  if (h1Match) {
    slug = h1Match[1].trim().toLowerCase()
      .replace(/[^\w\s-]/g, '').replace(/[\s_]+/g, '-').replace(/-+/g, '-')
      .replace(/^-|-$/g, '').slice(0, 80);
  }
  if (!slug) {
    try { slug = new URL(tab.url).pathname.replace(/\/$/, '').split('/').pop() || 'page'; }
    catch { slug = 'page'; }
  }
  const blob = new Blob([tab.markdown], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = slug + '.md';
  a.click();
  URL.revokeObjectURL(a.href);
});

// Open in browser
document.getElementById('openBtn').addEventListener('click', () => {
  const url = getActiveTab()?.url;
  if (url) window.open(url, '_blank');
});

// View toggle
document.querySelector('.view-toggle').addEventListener('click', (e) => {
  const btn = e.target.closest('.vt-btn');
  if (!btn) return;
  applyView(btn.dataset.view);
  saveSettings();
});

// Settings popover
settingsBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  settingsPopover.classList.toggle('open');
});
document.addEventListener('click', () => settingsPopover.classList.remove('open'));
settingsPopover.addEventListener('click', (e) => e.stopPropagation());
settingsPopover.addEventListener('change', () => {
  saveSettings();
  for (const key in pageCache) delete pageCache[key];
  const targetUrl = urlInput.value.trim();
  if (targetUrl) navigate(targetUrl, { pushState: false });
});

// Resizable divider
let dragging = false;
divider.addEventListener('mousedown', (e) => {
  dragging = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const panes = document.querySelector('.panes');
  const rect = panes.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const clamped = Math.max(0.15, Math.min(0.85, ratio));
  rawPane.style.flex = `0 0 ${clamped * 100}%`;
  previewPane.style.flex = `0 0 ${(1 - clamped) * 100}%`;
});
document.addEventListener('mouseup', () => {
  if (dragging) {
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});
</script>
</body>
</html>
