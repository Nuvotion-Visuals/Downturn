<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Downturn</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<style>
:root {
  /* Colors */
  --color-bg: #0d1117;
  --color-bg-secondary: #161b22;
  --color-bg-tertiary: #21262d;
  --color-border: #30363d;
  --color-border-hover: #8b949e;
  --color-text: #e6edf3;
  --color-text-muted: #8b949e;
  --color-text-placeholder: #6e7681;
  --color-link: #58a6ff;
  --color-accent: #1f6feb;
  --color-accent-alpha: rgba(31, 111, 235, 0.3);
  --color-danger: #f85149;
  --color-white: #fff;
  --color-shadow: rgba(0, 0, 0, 0.3);
  --color-shadow-heavy: rgba(0, 0, 0, 0.4);
  /* Typography */
  --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  --font-xs: .75rem;
  --font-sm: .875rem;
  --font-base: 1rem;
  --font-code: 85%;
  /* Spacing */
  --space-xs: 2px;
  --space-sm: 4px;
  --space-md: 8px;
  --space-lg: 16px;
  --space-xl: 24px;
  --space-2xl: 32px;
  /* Radii */
  --radius-sm: 3px;
  --radius: 6px;
  /* Controls */
  --control-h: 32px;
  --control-h-sm: 28px;
  --control-px: 12px;
  /* Sizes */
  --icon-sm: 10px;
  --icon-md: 14px;
  --icon-lg: 16px;
  --sidebar-w: 220px;
  --tab-w: 180px;
  --content-max-w: 700px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-family);
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.5;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
a { color: var(--color-link); text-decoration: none; }
a:hover { text-decoration: underline; }
/* Tab bar */
.tabbar {
  display: flex;
  align-items: stretch;
  background: var(--color-bg);
  padding: var(--space-md) var(--space-md) 0;
  flex-shrink: 0;
  gap: var(--space-sm);
  border-bottom: 1px solid var(--color-border);
}
.tabs {
  display: flex;
  gap: var(--space-xs);
  min-width: 0;
  flex-wrap: nowrap;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  height: var(--control-h);
  padding: 0 var(--control-px);
  width: var(--tab-w);
  background: var(--color-bg-tertiary);
  border: 1px solid var(--color-border);
  border-bottom: none;
  border-radius: var(--radius) var(--radius) 0 0;
  color: var(--color-text-muted);
  font-size: var(--font-xs);
  cursor: pointer;
  flex-shrink: 0;
}
.tab:hover { color: var(--color-text); }
.tab.drag-over-left { box-shadow: -2px 0 0 0 var(--color-accent); }
.tab.drag-over-right { box-shadow: 2px 0 0 0 var(--color-accent); }
.tab.dragging { opacity: 0.4; }
.tab.active {
  background: var(--color-bg-secondary);
  color: var(--color-text);
  border-color: var(--color-border);
  box-shadow: 0 1px 0 0 var(--color-bg-secondary);
}
.tab-icon, .sidebar-icon { width: 16px; height: 16px; flex-shrink: 0; border-radius: var(--space-xs); }
.tab-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}
.tab-close {
  display: none;
  width: var(--icon-lg);
  height: var(--icon-lg);
  line-height: var(--icon-lg);
  text-align: center;
  border-radius: var(--radius-sm);
  font-size: var(--font-sm);
  flex-shrink: 0;
}
.tab-close:hover { background: var(--color-border); }
.tab:hover .tab-close, .tab.active .tab-close { display: block; }
.tab-new {
  width: var(--control-h-sm);
  height: var(--control-h-sm);
  background: none;
  border: none;
  border-radius: var(--radius);
  color: var(--color-text-muted);
  font-size: var(--font-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  align-self: center;
}
.tab-new:hover { background: var(--color-bg-tertiary); color: var(--color-text); }
/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md);
  background: var(--color-bg-secondary);
  flex-shrink: 0;
}
.nav-btn {
  height: var(--control-h);
  width: var(--control-h);
  padding: 0;
  background: none;
  border: none;
  border-radius: var(--radius);
  color: var(--color-text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn svg { width: var(--icon-md); height: var(--icon-md); fill: currentColor; }
.nav-btn:hover { background: var(--color-bg-tertiary); color: var(--color-text); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn:disabled:hover { background: none; }
.topbar-sep { width: 1px; height: 20px; background: var(--color-border); flex-shrink: 0; }
#urlInput {
  height: var(--control-h);
  padding: 0 var(--control-px);
  font-size: var(--font-sm);
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  color: var(--color-text);
  line-height: var(--control-h);
  outline: none;
}
#urlInput:focus { border-color: var(--color-link); box-shadow: 0 0 0 3px var(--color-accent-alpha); }
#urlInput::placeholder { color: var(--color-text-placeholder); }
.topbar-right { display: flex; gap: var(--space-md); align-items: center; }
/* Loading */
#loading {
  display: none;
  width: var(--icon-lg); height: var(--icon-lg);
  border: 2px solid var(--color-border);
  border-top-color: var(--color-link);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* Settings popover */
.settings-wrap { position: relative; }
#settingsPopover {
  display: none;
  position: absolute;
  top: 40px;
  right: 0;
  background: var(--color-bg-secondary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: var(--control-px) var(--space-lg);
  z-index: 10;
  min-width: 200px;
  box-shadow: 0 var(--space-md) var(--space-xl) var(--color-shadow-heavy);
}
#settingsPopover.open { display: block; }
#settingsPopover label {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-sm) 0;
  font-size: var(--font-sm);
  color: var(--color-text);
  cursor: pointer;
}
.settings-section {
  font-size: var(--font-xs);
  color: var(--color-text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: var(--space-md) 0 var(--space-sm);
  border-top: 1px solid var(--color-border);
  margin-top: var(--space-md);
}
.settings-section:first-child { border-top: none; margin-top: 0; }
.theme-picker {
  display: flex;
  gap: var(--space-sm);
  padding: var(--space-sm) 0;
}
.theme-btn {
  flex: 1;
  padding: var(--space-sm) var(--space-md);
  font-size: var(--font-xs);
  background: var(--color-bg-tertiary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  color: var(--color-text-muted);
  cursor: pointer;
  text-align: center;
}
.theme-btn:hover { color: var(--color-text); border-color: var(--color-border-hover); }
.theme-btn.active { background: var(--color-accent); border-color: var(--color-accent); color: var(--color-white); }
/* Right sidebar content */
.right-sidebar-content {
  padding: var(--space-lg);
}
.right-sidebar-content select {
  width: 100%;
  height: var(--control-h-sm);
  padding: 0 var(--space-md);
  font-size: var(--font-xs);
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  color: var(--color-text);
  margin-top: var(--space-xs);
}
.right-sidebar-content select:focus { border-color: var(--color-link); outline: none; }
/* Main layout */
.main-area { flex: 1; display: flex; overflow: hidden; }
/* Split pane */
.panes {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-width: 0;
  border-top: 1px solid var(--color-border);
}
.pane {
  flex: 1;
  overflow: auto;
  padding: var(--space-xl) var(--space-2xl);
}
.pane::-webkit-scrollbar { width: var(--space-md); }
.pane::-webkit-scrollbar-track { background: transparent; }
.pane::-webkit-scrollbar-thumb { background: var(--color-bg-tertiary); }
.pane::-webkit-scrollbar-thumb:hover { background: var(--color-border-hover); }
#rawPane {
  font-family: var(--font-mono);
  font-size: var(--font-sm);
  line-height: 1.6;
  word-break: break-word;
  border-right: 1px solid var(--color-border);
  border-top: none; border-bottom: none; border-left: none;
  user-select: text;
  color: var(--color-text);
  background: var(--color-bg);
  resize: none;
  outline: none;
}
#rawPane::placeholder { color: var(--color-text-placeholder); }
.panes.single .pane {
  border-right: none;
  max-width: none;
  padding-left: max(var(--space-2xl), calc((100% - var(--content-max-w)) / 2));
  padding-right: max(var(--space-2xl), calc((100% - var(--content-max-w)) / 2));
}
.panes.single .divider { display: none; }
.divider {
  width: var(--space-sm);
  cursor: col-resize;
  background: var(--color-border);
  flex-shrink: 0;
}
.divider:hover { background: var(--color-link); }
/* Preview pane — GitHub markdown-body styling */
#previewPane {
  font-size: var(--font-base);
  line-height: 1.5;
  word-wrap: break-word;
  color: var(--color-text);
}
#previewPane h1 { font-size: 2em; font-weight: 600; margin: 0 0 var(--space-lg); padding-bottom: 0.3em; border-bottom: 1px solid var(--color-border); }
#previewPane h2 { font-size: 1.5em; font-weight: 600; margin: var(--space-xl) 0 var(--space-lg); padding-bottom: 0.3em; border-bottom: 1px solid var(--color-border); }
#previewPane h3 { font-size: 1.25em; font-weight: 600; margin: var(--space-xl) 0 var(--space-lg); }
#previewPane h4 { font-size: 1em; font-weight: 600; margin: var(--space-xl) 0 var(--space-lg); }
#previewPane h5 { font-size: var(--font-sm); font-weight: 600; margin: var(--space-xl) 0 var(--space-lg); }
#previewPane h6 { font-size: var(--font-xs); font-weight: 600; margin: var(--space-xl) 0 var(--space-lg); color: var(--color-text-muted); }
#previewPane p { margin: 0 0 var(--space-lg); }
#previewPane a { color: var(--color-link); text-decoration: none; cursor: pointer; }
#previewPane a:hover { text-decoration: underline; }
#previewPane img { max-width: 100%; border-radius: var(--radius); margin: var(--space-md) 0; }
#previewPane pre {
  background: var(--color-bg-secondary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: var(--space-lg);
  overflow-x: auto;
  margin: 0 0 var(--space-lg);
  line-height: 1.45;
}
#previewPane code {
  font-family: var(--font-mono);
  font-size: var(--font-code);
}
#previewPane :not(pre) > code {
  background: var(--color-bg-tertiary);
  padding: 0.2em 0.4em;
  border-radius: var(--radius);
  font-size: var(--font-code);
}
#previewPane blockquote {
  border-left: 0.25em solid var(--color-border);
  padding: 0 1em;
  margin: 0 0 var(--space-lg);
  color: var(--color-text-muted);
}
#previewPane ul, #previewPane ol { padding-left: 2em; margin: 0 0 var(--space-lg); }
#previewPane li { margin: 0.25em 0; }
#previewPane li + li { margin-top: 0.25em; }
#previewPane hr { border: none; border-top: 1px solid var(--color-border); margin: var(--space-xl) 0; height: 0.25em; background: var(--color-border); border-radius: var(--space-xs); }
#previewPane table { border-collapse: collapse; margin: 0 0 var(--space-lg); width: auto; display: block; overflow-x: auto; }
#previewPane th, #previewPane td { border: 1px solid var(--color-border); padding: var(--space-md) var(--control-px); }
#previewPane th { font-weight: 600; background: var(--color-bg-secondary); }
#previewPane tr:nth-child(2n) { background: var(--color-bg-secondary); }
#previewPane strong { font-weight: 600; }
/* Nav sidebar */
.nav-sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  overflow-y: auto;
  border-right: 1px solid var(--color-border);
  background: var(--color-bg-secondary);
  display: none;
  font-size: var(--font-xs);
}
.nav-sidebar.open { display: flex; flex-direction: column; }
.nav-sidebar ul { list-style: none; padding: var(--space-md) 0; }
.nav-sidebar li a {
  display: block;
  padding: var(--space-sm) var(--space-lg);
  color: var(--color-text-muted);
  text-decoration: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.nav-sidebar li a:hover { color: var(--color-link); background: var(--color-bg-tertiary); }
.nav-sidebar li a.active { color: var(--color-text); background: var(--color-bg-tertiary); font-weight: 600; }
.nav-sidebar .nav-empty { padding: var(--space-lg); color: var(--color-text-placeholder); text-align: center; font-style: italic; }
.file-tree-dir {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-sm) var(--space-lg);
  color: var(--color-text);
  font-weight: 600;
  font-size: var(--font-xs);
  cursor: pointer;
  user-select: none;
}
.file-tree-dir svg { width: var(--icon-sm); height: var(--icon-sm); fill: currentColor; transition: transform 0.15s; flex-shrink: 0; }
.file-tree-group.open > .file-tree-dir svg { transform: rotate(90deg); }
.file-tree-group > .file-tree-children { display: none; }
.file-tree-group.open > .file-tree-children { display: block; }
.file-tree-item {
  display: block;
  padding: var(--space-sm) var(--space-lg);
  color: var(--color-text-muted);
  text-decoration: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  font-size: var(--font-xs);
}
.file-tree-item:hover { color: var(--color-link); background: var(--color-bg-tertiary); }
.file-tree-item.active { color: var(--color-text); background: var(--color-bg-tertiary); font-weight: 600; }
.nav-sidebar::-webkit-scrollbar, .right-sidebar::-webkit-scrollbar, .sidebar-content::-webkit-scrollbar { width: var(--space-md); }
.nav-sidebar::-webkit-scrollbar-track, .right-sidebar::-webkit-scrollbar-track, .sidebar-content::-webkit-scrollbar-track { background: transparent; }
.nav-sidebar::-webkit-scrollbar-thumb, .right-sidebar::-webkit-scrollbar-thumb, .sidebar-content::-webkit-scrollbar-thumb { background: var(--color-bg-tertiary); }
.nav-sidebar::-webkit-scrollbar-thumb:hover, .right-sidebar::-webkit-scrollbar-thumb:hover, .sidebar-content::-webkit-scrollbar-thumb:hover { background: var(--color-border-hover); }
/* Right sidebar */
.right-sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  overflow-y: auto;
  border-left: 1px solid var(--color-border);
  background: var(--color-bg-secondary);
  display: none;
  font-size: var(--font-xs);
}
.right-sidebar.open { display: flex; flex-direction: column; }
/* Sidebar tabs */
.sidebar-tabs {
  display: flex;
  flex-shrink: 0;
}
.sidebar-tab {
  flex: 1;
  padding: var(--space-md) 0;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--color-text-muted);
  font-size: var(--font-xs);
  cursor: pointer;
  text-align: center;
}
.sidebar-tab:hover { color: var(--color-text); }
.sidebar-tab.active { color: var(--color-text); border-bottom-color: var(--color-accent); }
.sidebar-content { overflow-y: auto; flex: 1; }
/* Autocomplete */
.autocomplete {
  display: none;
  position: absolute;
  top: 100%; left: 0; right: 0;
  background: var(--color-bg-secondary);
  border: 1px solid var(--color-border);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  z-index: 20;
  max-height: 300px;
  overflow-y: auto;
  box-shadow: 0 var(--space-sm) var(--control-px) var(--color-shadow);
}
.autocomplete.open { display: block; }
.ac-item {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md) var(--control-px);
  cursor: pointer;
  font-size: var(--font-xs);
}
.ac-item > div { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.ac-item:hover, .ac-item.selected { background: var(--color-bg-tertiary); }
.ac-title { color: var(--color-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ac-url { color: var(--color-text-muted); font-size: var(--font-xs); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ac-star { color: var(--color-accent); margin-right: var(--space-sm); }
/* Bookmark button */
#bookmarkBtn .bm-filled { display: none; }
#bookmarkBtn.active .bm-outline { display: none; }
#bookmarkBtn.active .bm-filled { display: block; }
#bookmarkBtn.active { color: var(--color-accent); }
/* Sidebar list items (shared) */
.history-date { padding: var(--space-md) var(--space-lg) var(--space-sm); font-size: var(--font-xs); color: var(--color-text-muted); font-weight: 600; }
.history-item, .bookmark-item {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-sm) var(--space-lg);
  color: var(--color-text-muted);
  text-decoration: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  font-size: var(--font-xs);
}
.history-item:hover, .bookmark-item:hover { color: var(--color-link); background: var(--color-bg-tertiary); }
/* Bottom bar */
.bottombar {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md) var(--space-lg);
  background: var(--color-bg-secondary);
  border-top: 1px solid var(--color-border);
  flex-shrink: 0;
  font-size: var(--font-xs);
  color: var(--color-text-muted);
}
.bottombar button {
  height: var(--control-h-sm);
  padding: 0 var(--control-px);
  font-size: var(--font-xs);
  font-weight: 500;
  background: var(--color-bg-tertiary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  color: var(--color-text);
  cursor: pointer;
}
.bottombar button svg { width: var(--icon-md); height: var(--icon-md); fill: currentColor; flex-shrink: 0; }
.bottombar button { display: flex; align-items: center; gap: var(--space-sm); }
.bottombar button:hover:not(:disabled) { background: var(--color-border); border-color: var(--color-border-hover); }
.bottombar button:disabled { color: var(--color-text-muted); cursor: default; }
.view-toggle { display: inline-flex; }
.view-toggle .vt-btn { border-radius: 0; border-right: none; }
.view-toggle .vt-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.view-toggle .vt-btn:last-child { border-right: 1px solid var(--color-border); border-radius: 0 var(--radius) var(--radius) 0; }
.vt-btn.active { background: var(--color-accent); border-color: var(--color-accent); color: var(--color-white); }
#status { flex: 1; }
/* Empty state */
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--color-text-placeholder);
  font-size: var(--font-sm);
}
/* === Responsive: Mobile === */
@media (max-width: 639px) {
  :root {
    --control-h: 44px;
    --control-h-sm: 40px;
    --icon-sm: 14px;
    --icon-md: 18px;
    --icon-lg: 20px;
    --sidebar-w: 85vw;
    --tab-w: auto;
    --content-max-w: 100%;
    --space-2xl: 16px;
    --space-xl: 16px;
  }
  .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { flex: 0 0 auto; width: auto; min-width: 80px; max-width: 120px; }
  .tabbar { padding: var(--space-sm) var(--space-sm) 0; }
  #backBtn, #fwdBtn, #refreshBtn, #homeBtn,
  #openFileBtn, #openFolderBtn, .topbar-sep { display: none; }
  .topbar { padding: var(--space-sm) var(--space-md); gap: var(--space-sm); }
  .nav-sidebar.open {
    position: fixed;
    top: 0; bottom: 0; left: 0;
    width: min(320px, 85vw);
    z-index: 100;
  }
  .right-sidebar.open {
    position: fixed;
    top: 0; bottom: 0; right: 0;
    width: min(320px, 85vw);
    z-index: 100;
  }
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
  }
  .sidebar-overlay.open { display: block; }
  .pane { padding: var(--space-lg); }
  .panes.single .pane { padding-left: var(--space-lg); padding-right: var(--space-lg); }
  .divider { display: none; }
  .vt-btn[data-view="both"] { display: none; }
  .bottombar {
    flex-wrap: wrap;
    padding: var(--space-sm) var(--space-md);
    gap: var(--space-sm);
  }
  .bottombar button { height: 40px; font-size: var(--font-sm); justify-content: center; }
  .bottombar .btn-label { display: none; }
  #status { width: 100%; text-align: center; font-size: var(--font-xs); }
  #stats { display: none; }
  #settingsPopover {
    position: fixed;
    top: auto;
    bottom: 0;
    left: 0;
    right: 0;
    border-radius: var(--radius) var(--radius) 0 0;
    max-height: 70vh;
    overflow-y: auto;
    min-width: 100%;
    padding: var(--space-lg);
  }
}
@media (min-width: 640px) {
  .sidebar-overlay { display: none !important; }
}
/* Touch devices: active states + always-visible close */
@media (pointer: coarse) {
  .tab:active { background: var(--color-bg-tertiary); }
  .nav-btn:active { background: var(--color-bg-tertiary); }
  .bottombar button:active:not(:disabled) { background: var(--color-border); }
  .tab-close { display: block; }
  .nav-sidebar li a, .file-tree-item, .history-item, .bookmark-item { min-height: 44px; display: flex; align-items: center; }
  .sidebar-tab { min-height: 44px; }
  .ac-item { min-height: 44px; }
}
/* Safe area insets for notched devices */
@supports (padding: env(safe-area-inset-bottom)) {
  .bottombar { padding-bottom: calc(var(--space-md) + env(safe-area-inset-bottom)); }
}
</style>

<script type="module">
import { markdownToHtml, inline, esc, normalizeUrl, formatStats, debounce, faviconUrl, resolveOmnibox } from './ui.mjs';
import * as db from './db.mjs';
import { THEMES, applyTheme, getSystemTheme, listFonts } from './themes.mjs';
const API_BASE = '';

// Settings persistence
let currentThemeName = 'auto';

function saveSettings() {
  const settings = {
    optTitle: document.getElementById('optTitle').checked,
    optLinks: document.getElementById('optLinks').checked,
    optImages: document.getElementById('optImages').checked,
    optClean: document.getElementById('optClean').checked,
    optAbsolute: document.getElementById('optAbsolute').checked,
    view: document.querySelector('.vt-btn.active')?.dataset.view || 'both',
    navOpen: document.getElementById('navSidebar').classList.contains('open'),
    theme: currentThemeName,
    fontEditor: document.getElementById('fontEditor').value || null,
    fontPreview: document.getElementById('fontPreview').value || null,
  };
  db.saveSettings(settings);
}
function applyView(view) {
  document.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.vt-btn[data-view="${view}"]`);
  if (btn) btn.classList.add('active');
  const panes = document.querySelector('.panes');
  document.getElementById('rawPane').style.display = (view === 'preview') ? 'none' : '';
  document.getElementById('previewPane').style.display = (view === 'raw') ? 'none' : '';
  panes.classList.toggle('single', view !== 'both');
}
async function loadSettings() {
  try {
    const s = await db.getSettings();
    if (!s) return false;
    if (s.optTitle !== undefined) document.getElementById('optTitle').checked = s.optTitle;
    if (s.optLinks !== undefined) document.getElementById('optLinks').checked = s.optLinks;
    if (s.optImages !== undefined) document.getElementById('optImages').checked = s.optImages;
    if (s.optClean !== undefined) document.getElementById('optClean').checked = s.optClean;
    if (s.optAbsolute !== undefined) document.getElementById('optAbsolute').checked = s.optAbsolute;
    let view = s.view;
    if (view === 'both' && window.innerWidth < 640) view = 'preview';
    if (view) applyView(view);
    const sidebar = document.getElementById('navSidebar');
    if (s.navOpen && window.innerWidth >= 640) sidebar.classList.add('open');
    else sidebar.classList.remove('open');
    // Theme
    if (s.theme) {
      currentThemeName = s.theme;
      setTheme(s.theme);
    }
    // Fonts
    if (s.fontEditor) {
      document.getElementById('fontEditor').value = s.fontEditor;
      document.documentElement.style.setProperty('--font-mono', `"${s.fontEditor}", var(--font-mono)`);
    }
    if (s.fontPreview) {
      document.getElementById('fontPreview').value = s.fontPreview;
      document.documentElement.style.setProperty('--font-family', `"${s.fontPreview}", var(--font-family)`);
    }
    return true;
  } catch { return false; }
}

// Elements
const urlInput = document.getElementById('urlInput');
const rawPane = document.getElementById('rawPane');
const previewPane = document.getElementById('previewPane');
const navSidebar = document.getElementById('navSidebar');
const loading = document.getElementById('loading');
const statusEl = document.getElementById('status');
const stats = document.getElementById('stats');
const divider = document.getElementById('divider');
const settingsBtn = document.getElementById('settingsBtn');
const settingsPopover = document.getElementById('settingsPopover');
const tabContainer = document.getElementById('tabContainer');

// Tab state
let tabs = [];
let activeTabId = 0;
let nextTabId = 1;
const pageCache = {};
let folderHandle = null;
let folderTree = [];
let fileHandles = new Map();

function saveTabs() {
  const data = {
    tabs: tabs.map(t => ({ id: t.id, url: t.url, markdown: t.markdown, nav: t.nav, stats: t.stats, source: t.source, filePath: t.filePath })),
    activeTabId,
    nextTabId,
  };
  db.saveTabs(data);
}

async function loadTabs() {
  try {
    const data = await db.getTabs();
    if (!data || !data.tabs?.length) return false;
    tabs = data.tabs.map(t => ({ ...t, rawScroll: 0, previewScroll: 0 }));
    activeTabId = data.activeTabId;
    nextTabId = data.nextTabId;
    // Repopulate pageCache from tab data
    for (const t of tabs) {
      if (t.url && t.markdown) pageCache[t.url] = { markdown: t.markdown, nav: t.nav };
    }
    return true;
  } catch { return false; }
}

function getTab(id) { return tabs.find(t => t.id === id); }
function getActiveTab() { return getTab(activeTabId); }

function tabTitle(tab) {
  if (tab.filePath) return tab.filePath;
  if (tab.markdown) {
    const m = tab.markdown.match(/^#\s+(.+)/m);
    if (m) return m[1].slice(0, 40);
  }
  if (tab.url) {
    try { return new URL(tab.url).hostname; } catch {}
  }
  return 'Start Page';
}

function renderTabs() {
  tabContainer.innerHTML = tabs.map(t => {
    const icon = t.url ? `<img class="tab-icon" src="${faviconUrl(t.url)}">` : '';
    return `<div class="tab${t.id === activeTabId ? ' active' : ''}" data-tab-id="${t.id}" draggable="true">` +
    `${icon}<span class="tab-title">${tabTitle(t)}</span>` +
    `<span class="tab-close">&times;</span></div>`;
  }).join('');
  saveTabs();
  // Scroll active tab into view on narrow screens
  requestAnimationFrame(() => {
    tabContainer.querySelector('.tab.active')?.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
  });
}

function saveTabScroll() {
  const tab = getActiveTab();
  if (tab) {
    tab.rawScroll = rawPane.scrollTop;
    tab.previewScroll = previewPane.scrollTop;
  }
}

function displayTab(tab) {
  urlInput.value = tab.filePath || tab.url || '';
  if (tab.markdown) {
    rawPane.value = tab.markdown;
    previewPane.innerHTML = markdownToHtml(tab.markdown);
    document.getElementById('copyBtn').disabled = false;
    document.getElementById('downloadBtn').disabled = false;
  } else {
    rawPane.value = '';
    previewPane.innerHTML = '<div class="empty-state">Rendered preview will appear here</div>';
    document.getElementById('copyBtn').disabled = true;
    document.getElementById('downloadBtn').disabled = true;
  }
  document.getElementById('openBtn').style.display = (tab.url && !tab.url.startsWith('__search__:')) ? '' : 'none';
  // Show file tree or nav depending on tab source
  if (folderTree.length && (tab.source === 'file' || !tab.url)) {
    renderFileTree(folderTree);
  } else {
    renderNav(tab.nav || null);
  }
  stats.textContent = tab.stats || '';
  statusEl.textContent = '';
  requestAnimationFrame(() => {
    rawPane.scrollTop = tab.rawScroll || 0;
    previewPane.scrollTop = tab.previewScroll || 0;
  });
  window.history.replaceState({ url: tab.url }, '', tab.url ? '#' + tab.url : window.location.pathname);
  updateBookmarkBtn();
}

function switchTab(id) {
  if (id === activeTabId) return;
  saveTabScroll();
  activeTabId = id;
  renderTabs();
  displayTab(getActiveTab());
}

function createTab(url, { startPage = true } = {}) {
  const tab = { id: nextTabId++, url: '', markdown: '', nav: [], stats: '', rawScroll: 0, previewScroll: 0 };
  tabs.push(tab);
  saveTabScroll();
  activeTabId = tab.id;
  renderTabs();
  displayTab(tab);
  if (url) {
    navigate(url);
  } else if (startPage) {
    loadStartPage(tab);
    urlInput.focus();
  }
  return tab;
}

async function loadStartPage(tab) {
  try {
    const resp = await fetch('/start.md');
    if (!resp.ok) return;
    const md = await resp.text();
    tab.markdown = md;
    if (getActiveTab() === tab) {
      rawPane.value = md;
      previewPane.innerHTML = markdownToHtml(md);
      document.getElementById('copyBtn').disabled = false;
      document.getElementById('downloadBtn').disabled = false;
    }
    renderTabs();
  } catch {}
}

function closeTab(id) {
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  tabs.splice(idx, 1);
  if (tabs.length === 0) {
    createTab();
    return;
  }
  if (activeTabId === id) {
    activeTabId = tabs[Math.min(idx, tabs.length - 1)].id;
    displayTab(getActiveTab());
  }
  renderTabs();
}

// Tab bar events
tabContainer.addEventListener('click', (e) => {
  const close = e.target.closest('.tab-close');
  if (close) {
    const tabEl = close.closest('.tab');
    closeTab(Number(tabEl.dataset.tabId));
    return;
  }
  const tabEl = e.target.closest('.tab');
  if (tabEl) switchTab(Number(tabEl.dataset.tabId));
});
tabContainer.addEventListener('auxclick', (e) => {
  if (e.button !== 1) return;
  const tabEl = e.target.closest('.tab');
  if (tabEl) { e.preventDefault(); closeTab(Number(tabEl.dataset.tabId)); }
});

// Tab drag reorder
let dragTabId = null;
tabContainer.addEventListener('dragstart', (e) => {
  const tabEl = e.target.closest('.tab');
  if (!tabEl) return;
  dragTabId = Number(tabEl.dataset.tabId);
  tabEl.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
});
tabContainer.addEventListener('dragend', (e) => {
  dragTabId = null;
  tabContainer.querySelectorAll('.tab').forEach(t => t.classList.remove('dragging', 'drag-over-left', 'drag-over-right'));
});
tabContainer.addEventListener('dragover', (e) => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const tabEl = e.target.closest('.tab');
  tabContainer.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over-left', 'drag-over-right'));
  if (!tabEl || Number(tabEl.dataset.tabId) === dragTabId) return;
  const rect = tabEl.getBoundingClientRect();
  const half = (e.clientX - rect.left) < rect.width / 2;
  tabEl.classList.add(half ? 'drag-over-left' : 'drag-over-right');
});
tabContainer.addEventListener('drop', (e) => {
  e.preventDefault();
  const tabEl = e.target.closest('.tab');
  if (!tabEl || dragTabId === null) return;
  const fromIdx = tabs.findIndex(t => t.id === dragTabId);
  let toIdx = tabs.findIndex(t => t.id === Number(tabEl.dataset.tabId));
  if (fromIdx === -1 || toIdx === -1 || fromIdx === toIdx) return;
  const rect = tabEl.getBoundingClientRect();
  const insertAfter = (e.clientX - rect.left) >= rect.width / 2;
  const [moved] = tabs.splice(fromIdx, 1);
  toIdx = tabs.findIndex(t => t.id === Number(tabEl.dataset.tabId));
  tabs.splice(insertAfter ? toIdx + 1 : toIdx, 0, moved);
  renderTabs();
});

// Navigate in current tab
async function navigate(targetUrl, { pushState = true } = {}) {
  if (!targetUrl) return;
  targetUrl = normalizeUrl(targetUrl);

  // Handle search queries
  let isSearch = false;
  let searchQuery = '';
  if (targetUrl.startsWith('__search__:')) {
    isSearch = true;
    searchQuery = targetUrl.slice('__search__:'.length);
    targetUrl = '__search__:' + searchQuery;
  }

  const tab = getActiveTab();
  const prevUrl = tab.url;
  const prevMarkdown = tab.markdown;
  tab.url = targetUrl;
  urlInput.value = isSearch ? searchQuery : targetUrl;

  // L1: in-memory cache, L2: IndexedDB cache
  if (!pageCache[targetUrl]) {
    const dbCached = await db.getCache(targetUrl);
    if (dbCached) pageCache[targetUrl] = { markdown: dbCached.markdown, nav: dbCached.nav };
  }
  if (pageCache[targetUrl]) {
    const cached = pageCache[targetUrl];
    tab.markdown = cached.markdown;
    tab.nav = cached.nav;
    const t0 = performance.now();
    rawPane.value = tab.markdown;
    previewPane.innerHTML = markdownToHtml(tab.markdown);
    renderNav(tab.nav);
    tab.stats = formatStats(tab.markdown, performance.now() - t0, '(cached)');
    stats.textContent = tab.stats;
    document.getElementById('copyBtn').disabled = false;
    document.getElementById('downloadBtn').disabled = false;
    document.getElementById('openBtn').style.display = '';
    requestAnimationFrame(() => { rawPane.scrollTop = 0; previewPane.scrollTop = 0; });
    if (pushState) window.history.pushState({ url: targetUrl }, '', isSearch ? '#search:' + searchQuery : '#' + targetUrl);
    statusEl.textContent = '';
    renderTabs();
    return;
  }

  loading.style.display = 'block';
  statusEl.textContent = 'Fetching...';
  stats.textContent = '';
  const t0 = performance.now();

  const params = new URLSearchParams({
    url: targetUrl, nav: 'true',
    title: document.getElementById('optTitle').checked,
    links: document.getElementById('optLinks').checked,
    images: document.getElementById('optImages').checked,
    clean: document.getElementById('optClean').checked,
    absoluteUrls: document.getElementById('optAbsolute').checked,
  });

  try {
    let fetchUrl;
    if (isSearch) {
      fetchUrl = `${API_BASE}/api/search?q=${encodeURIComponent(searchQuery)}`;
    } else {
      fetchUrl = `${API_BASE}/api?${params}`;
    }
    const resp = await fetch(fetchUrl);
    if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
    const data = await resp.json();
    const elapsed = performance.now() - t0;

    tab.markdown = data.markdown;
    tab.nav = data.nav;
    pageCache[targetUrl] = data;
    db.setCache(targetUrl, data.markdown, data.nav);
    const h1 = data.markdown.match(/^#\s+(.+)/m);
    db.addHistory(targetUrl, h1 ? h1[1] : '');

    rawPane.value = tab.markdown;
    previewPane.innerHTML = markdownToHtml(tab.markdown);
    renderNav(tab.nav);
    tab.stats = formatStats(tab.markdown, elapsed);
    stats.textContent = tab.stats;
    document.getElementById('copyBtn').disabled = false;
    document.getElementById('downloadBtn').disabled = false;
    document.getElementById('openBtn').style.display = '';
    requestAnimationFrame(() => { rawPane.scrollTop = 0; previewPane.scrollTop = 0; });
    if (pushState) window.history.pushState({ url: targetUrl }, '', isSearch ? '#search:' + searchQuery : '#' + targetUrl);
    statusEl.textContent = '';
    renderTabs();
    updateBookmarkBtn();
  } catch (e) {
    // Push error as its own history entry so back returns to previous page
    tab.url = prevUrl;
    tab.markdown = prevMarkdown;
    if (pushState) window.history.pushState({ url: prevUrl }, '', window.location.hash);
    urlInput.value = isSearch ? searchQuery : targetUrl;
    statusEl.textContent = `Error: ${e.message}`;
    previewPane.innerHTML = `<div class="empty-state">Error: ${e.message}<br><br>This page may be blocking automated traffic.</div>`;
    rawPane.value = `Error: ${e.message}`;
    renderTabs();
  } finally {
    loading.style.display = 'none';
  }
}

// File/Folder handling

async function scanDirectory(dirHandle, prefix = '') {
  const items = [];
  for await (const [name, handle] of dirHandle.entries()) {
    if (handle.kind === 'file' && /\.(md|markdown|txt)$/i.test(name)) {
      items.push({ name, path: prefix + name, handle, kind: 'file' });
    } else if (handle.kind === 'directory' && !name.startsWith('.') && name !== 'node_modules') {
      const children = await scanDirectory(handle, prefix + name + '/');
      if (children.length) items.push({ name, path: prefix + name, handle, kind: 'dir', children });
    }
  }
  return items.sort((a, b) => (a.kind === b.kind ? a.name.localeCompare(b.name) : a.kind === 'dir' ? -1 : 1));
}

function renderFileTree(tree, depth = 0) {
  const ul = document.querySelector('#sidebarNav ul');
  const activeTab = getActiveTab();
  const activePath = activeTab?.filePath || '';

  const chevron = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512"><path d="M278.6 233.4c12.5 12.5 12.5 32.8 0 45.3l-160 160c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L210.7 256 73.4 118.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l160 160z"/></svg>';

  function buildHtml(items, depth) {
    let html = '';
    for (const item of items) {
      const pad = `padding-left: ${16 + depth * 14}px`;
      if (item.kind === 'dir') {
        html += `<li class="file-tree-group open">`;
        html += `<div class="file-tree-dir" style="${pad}" data-path="${item.path}">${chevron}${item.name}</div>`;
        html += `<ul class="file-tree-children">${item.children ? buildHtml(item.children, depth + 1) : ''}</ul>`;
        html += `</li>`;
      } else {
        const active = item.path === activePath ? ' active' : '';
        html += `<li><a class="file-tree-item${active}" style="${pad}" data-path="${item.path}">${item.name}</a></li>`;
      }
    }
    return html;
  }

  ul.innerHTML = buildHtml(tree, 0);
}

async function openFileFromTree(path, { pushState = true } = {}) {
  // Find the handle by walking the tree
  function findHandle(items, target) {
    for (const item of items) {
      if (item.path === target && item.kind === 'file') return item.handle;
      if (item.children) { const h = findHandle(item.children, target); if (h) return h; }
    }
    return null;
  }
  const handle = findHandle(folderTree, path);
  if (!handle) return;
  const file = await handle.getFile();
  const text = await file.text();
  const tab = getActiveTab();
  tab.source = 'file';
  tab.filePath = path;
  tab.markdown = text;
  tab.url = '';
  tab.nav = [];
  fileHandles.set(tab.id, handle);
  rawPane.value = text;
  previewPane.innerHTML = markdownToHtml(text);
  document.getElementById('copyBtn').disabled = false;
  document.getElementById('downloadBtn').disabled = false;
  document.getElementById('openBtn').disabled = true;
  urlInput.value = path;
  stats.textContent = formatStats(text, 0);
  tab.stats = stats.textContent;
  renderTabs();
  renderFileTree(folderTree);
  if (pushState) window.history.pushState({ filePath: path }, '', '#file:' + path);
  requestAnimationFrame(() => { rawPane.scrollTop = 0; previewPane.scrollTop = 0; });
}

// Save (Ctrl+S)
async function saveFile() {
  const tab = getActiveTab();
  if (!tab?.markdown) return;
  let handle = fileHandles.get(tab.id);
  if (!handle && window.showSaveFilePicker) {
    try {
      handle = await window.showSaveFilePicker({
        suggestedName: (tab.filePath || 'document') + (tab.filePath?.endsWith('.md') ? '' : '.md'),
        types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md'] } }],
      });
      fileHandles.set(tab.id, handle);
      tab.source = 'file';
      tab.filePath = handle.name;
    } catch { return; }
  }
  if (handle) {
    const writable = await handle.createWritable();
    await writable.write(rawPane.value);
    await writable.close();
  } else {
    const name = (tab.filePath || 'document').replace(/\.md$/, '') + '.md';
    const blob = new Blob([rawPane.value], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
  }
  tab.markdown = rawPane.value;
  statusEl.textContent = 'Saved';
  setTimeout(() => { statusEl.textContent = ''; }, 1500);
  renderTabs();
}

// Download
document.getElementById('downloadBtn').addEventListener('click', () => {
  const tab = getActiveTab();
  if (!tab?.markdown) return;
  const h1Match = tab.markdown.match(/^#\s+(.+)/m);
  let slug;
  if (h1Match) {
    slug = h1Match[1].trim().toLowerCase()
      .replace(/[^\w\s-]/g, '').replace(/[\s_]+/g, '-').replace(/-+/g, '-')
      .replace(/^-|-$/g, '').slice(0, 80);
  }
  if (!slug) {
    try { slug = new URL(tab.url).pathname.replace(/\/$/, '').split('/').pop() || 'page'; }
    catch { slug = 'page'; }
  }
  const blob = new Blob([tab.markdown], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = slug + '.md';
  a.click();
  URL.revokeObjectURL(a.href);
});

  if (await db.isBookmarked(tab.url)) {
    await db.removeBookmark(tab.url);
  } else {
    const h1 = tab.markdown?.match(/^#\s+(.+)/m);
    await db.addBookmark(tab.url, h1 ? h1[1] : tab.url);
  }
  updateBookmarkBtn();
});

async function renderBookmarksSidebar() {
  const el = document.getElementById('sidebarBookmarks');
  const bookmarks = await db.getBookmarks();
  if (!bookmarks.length) {
    el.innerHTML = '<div class="nav-empty" style="padding:16px;color:var(--color-text-placeholder);text-align:center;font-style:italic">No bookmarks yet</div>';
    return;
  }
  el.innerHTML = bookmarks.map(b =>
    `<a class="bookmark-item" data-url="${b.url}" title="${b.url}"><img class="sidebar-icon" src="${faviconUrl(b.url)}">${b.title || b.url}</a>`
  ).join('');
}

document.getElementById('sidebarBookmarks').addEventListener('click', (e) => {
  const item = e.target.closest('.bookmark-item');
  if (!item) return;
  const url = item.dataset.url;
  if (e.ctrlKey || e.metaKey) createTab(url);
  else navigate(url);
});

// History sidebar
async function renderHistorySidebar() {
  const el = document.getElementById('sidebarHistory');
  const history = await db.getHistory(100);
  if (!history.length) {
    el.innerHTML = '<div class="nav-empty" style="padding:16px;color:var(--color-text-placeholder);text-align:center;font-style:italic">No history yet</div>';
    return;
  }
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const yesterday = today - 86400000;
  const week = today - 7 * 86400000;
  let html = '';
  let section = '';
  for (const h of history) {
    let label;
    if (h.timestamp >= today) label = 'Today';
    else if (h.timestamp >= yesterday) label = 'Yesterday';
    else if (h.timestamp >= week) label = 'Last 7 days';
    else label = 'Older';
    if (label !== section) { section = label; html += `<div class="history-date">${label}</div>`; }
    html += `<a class="history-item" data-url="${h.url}" title="${h.url}"><img class="sidebar-icon" src="${faviconUrl(h.url)}">${h.title || h.url}</a>`;
  }
  el.innerHTML = html;
}

document.getElementById('sidebarHistory').addEventListener('click', (e) => {
  const item = e.target.closest('.history-item');
  if (!item) return;
  const url = item.dataset.url;
  if (e.ctrlKey || e.metaKey) createTab(url);
  else navigate(url);
});

// URL autocomplete
const autocomplete = document.getElementById('autocomplete');
let acIndex = -1;

urlInput.addEventListener('input', debounce(async () => {
  const q = urlInput.value.trim();
  if (!q || q.startsWith('http://') || q.startsWith('https://')) {
    // Only autocomplete partial queries, not full URLs
    if (q.length < 5) { autocomplete.classList.remove('open'); return; }
  }
  const [histResults, bookmarks] = await Promise.all([
    db.searchHistory(q),
    db.getBookmarks(),
  ]);
  const bmMatches = bookmarks.filter(b =>
    b.url.toLowerCase().includes(q.toLowerCase()) || (b.title && b.title.toLowerCase().includes(q.toLowerCase()))
  );
  const seen = new Set();
  const items = [];
  for (const b of bmMatches.slice(0, 3)) {
    if (seen.has(b.url)) continue; seen.add(b.url);
    items.push({ title: b.title, url: b.url, star: true });
  }
  for (const h of histResults.slice(0, 8)) {
    if (seen.has(h.url)) continue; seen.add(h.url);
    items.push({ title: h.title, url: h.url, star: false });
  }
  if (!items.length) { autocomplete.classList.remove('open'); return; }
  acIndex = -1;
  autocomplete.innerHTML = items.map((it, i) =>
    `<div class="ac-item" data-url="${it.url}" data-index="${i}">` +
    `<img class="sidebar-icon" src="${faviconUrl(it.url)}">` +
    `<div><span class="ac-title">${it.star ? '<span class="ac-star">&#9733;</span>' : ''}${it.title || it.url}</span>` +
    `<span class="ac-url">${it.url}</span></div></div>`
  ).join('');
  autocomplete.classList.add('open');
}, 100));

autocomplete.addEventListener('click', (e) => {
  const item = e.target.closest('.ac-item');
  if (!item) return;
  autocomplete.classList.remove('open');
  navigate(item.dataset.url);
});

urlInput.addEventListener('keydown', (e) => {
  if (!autocomplete.classList.contains('open')) return;
  const items = autocomplete.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acIndex + 1, items.length - 1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acIndex = Math.max(acIndex - 1, -1); }
  else if (e.key === 'Enter' && acIndex >= 0) { e.preventDefault(); autocomplete.classList.remove('open'); navigate(items[acIndex].dataset.url); return; }
  else if (e.key === 'Escape') { autocomplete.classList.remove('open'); return; }
  else return;
  items.forEach((it, i) => it.classList.toggle('selected', i === acIndex));
});

urlInput.addEventListener('blur', () => {
  setTimeout(() => autocomplete.classList.remove('open'), 200);
});

// Update bookmark button on navigate
const origNavigate = navigate;
// (bookmark state updates are handled inline below)

// Resizable divider
let dragging = false;
divider.addEventListener('mousedown', (e) => {
  dragging = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const panes = document.querySelector('.panes');
  const rect = panes.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const clamped = Math.max(0.15, Math.min(0.85, ratio));
  rawPane.style.flex = `0 0 ${clamped * 100}%`;
  previewPane.style.flex = `0 0 ${(1 - clamped) * 100}%`;
});
document.addEventListener('mouseup', () => {
  if (dragging) {
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});
// Touch support for divider
divider.addEventListener('touchstart', (e) => {
  dragging = true;
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('touchmove', (e) => {
  if (!dragging) return;
  const panes = document.querySelector('.panes');
  const rect = panes.getBoundingClientRect();
  const touch = e.touches[0];
  const ratio = (touch.clientX - rect.left) / rect.width;
  const clamped = Math.max(0.15, Math.min(0.85, ratio));
  rawPane.style.flex = `0 0 ${clamped * 100}%`;
  previewPane.style.flex = `0 0 ${(1 - clamped) * 100}%`;
});
document.addEventListener('touchend', () => {
  if (dragging) {
    dragging = false;
    document.body.style.userSelect = '';
  }
});

// Edge-swipe navigation (mobile PWA)
let swipeStartX = 0, swipeStartY = 0;
document.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  if (t.clientX < 20 || t.clientX > window.innerWidth - 20) {
    swipeStartX = t.clientX;
    swipeStartY = t.clientY;
  } else {
    swipeStartX = -1;
  }
});
document.addEventListener('touchend', (e) => {
  if (swipeStartX < 0) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - swipeStartX;
  const dy = Math.abs(t.clientY - swipeStartY);
  if (dy > Math.abs(dx)) return;
  if (swipeStartX < 20 && dx > 80) history.back();
  if (swipeStartX > window.innerWidth - 20 && dx < -80) history.forward();
});

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
