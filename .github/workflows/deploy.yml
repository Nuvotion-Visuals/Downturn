name: Deploy & Publish

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
          sparse-checkout: package.json
      - id: check
        run: |
          OLD=$(git show HEAD~1:package.json | jq -r .version)
          NEW=$(jq -r .version package.json)
          echo "old=$OLD new=$NEW"
          [ "$OLD" != "$NEW" ] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"

  deploy:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  publish:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm publish --access public

  release:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm run ext:build
      - run: cd extension/dist && zip -r ../../downturn-extension.zip .
      - run: |
          VERSION=$(jq -r .version package.json)
          gh release create "v$VERSION" downturn-extension.zip \
            --title "v$VERSION" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
